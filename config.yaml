# Forge Configuration
#
# Every setting below can be overridden via a FORGE_* environment variable
# without modifying this file. See src/config.py for the full list.
#
# Environment variable priority:
#   FORGE_* env var  >  this file  >  code defaults

project:
  # Absolute path to your project repo on the server.
  # Override: FORGE_PROJECT_PATH=/your/path
  path: /path/to/your/project

  # Memory bank directory, relative to project path.
  # Override: FORGE_MEMORY_DIR=memory
  memory_dir: memory

models:
  # Model identifiers use litellm format: "provider/model-name"
  # See https://docs.litellm.ai/docs/providers for supported providers.
  #
  # Examples:
  #   anthropic/claude-sonnet-4-5    (Anthropic Claude)
  #   gemini/gemini-2.5-pro          (Google Gemini)
  #   openai/gpt-4o                  (OpenAI)
  #   deepseek/deepseek-chat         (DeepSeek)
  #   openrouter/anthropic/claude-3-opus  (via OpenRouter)
  #
  # Override any model via env var:
  #   FORGE_MODEL_CODER=anthropic/claude-sonnet-4-5
  #   FORGE_MODEL_CODER_FALLBACK=gemini/gemini-2.5-pro
  #   FORGE_MODEL_JUNIOR_REVIEWER=deepseek/deepseek-chat
  #   FORGE_MODEL_SENIOR_REVIEWER=anthropic/claude-sonnet-4-5
  #   FORGE_MODEL_CONTEXT_UPDATER=deepseek/deepseek-chat

  # Primary coding model — must be capable enough to implement code from a description
  coder: ${FORGE_MODEL_CODER}

  # Fallback if primary coder completely fails (no output at all)
  coder_fallback: ${FORGE_MODEL_CODER_FALLBACK}

  # Junior reviewer — cheap, runs in tight loop with the coder
  junior_reviewer: ${FORGE_MODEL_JUNIOR_REVIEWER}

  # Senior reviewer — thorough, runs once or twice per step
  senior_reviewer: ${FORGE_MODEL_SENIOR_REVIEWER}

  # Context updater — updates memory bank after each successful step
  context_updater: ${FORGE_MODEL_CONTEXT_UPDATER}

telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}

pipeline:
  # Max times the coder retries after pre-commit hook failures.
  # Override: FORGE_MAX_HOOK_RETRIES=3
  max_hook_retries: 3

  # Max iterations in the junior review loop before escalating to senior.
  # Override: FORGE_MAX_JUNIOR_RETRIES=3
  max_junior_retries: 3

  # Max rounds of senior escalation before giving up.
  # Override: FORGE_MAX_SENIOR_ROUNDS=2
  max_senior_rounds: 2

  # Timeout (seconds) for a single Aider invocation.
  # Override: FORGE_AIDER_TIMEOUT=900
  aider_timeout: 900

pre_commit:
  # Commands run after the coder finishes, before review.
  # All must exit 0 for the pipeline to proceed.
  # Override with comma-separated list: FORGE_PRECOMMIT_COMMANDS="ruff check src/,pytest tests/ -x -q"
  commands:
    - "ruff check src/"
    - "mypy src/ --config-file mypy.ini"
    - "pytest tests/ -x -q --tb=short"

# Roadmap parsing — regex patterns for ROADMAP.md step lines.
# Override: FORGE_UNCHECKED_PATTERN=... and FORGE_CHECKED_PATTERN=...
roadmap:
  unchecked_pattern: '^\s*-\s*\[ \]\s*\*{0,2}Step\s+(\d+\.\d+):?\*{0,2}\s*(.*)'
  checked_pattern: '^\s*-\s*\[x\]\s*\*{0,2}Step\s+(\d+\.\d+):?\*{0,2}\s*(.*)'
