services:
  forge:
    build: .
    container_name: forge-bot
    restart: unless-stopped
    volumes:
      # Mount your project repo. Set FORGE_PROJECT_PATH in .env to control the path inside the container.
      - ${FORGE_PROJECT_PATH:-/home/forge/wealth-ops}:/project
      # Persist bot state across restarts
      - ./state:/app/state
    environment:
      # в”Ђв”Ђ Telegram в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}

      # в”Ђв”Ђ API Keys в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

      # в”Ђв”Ђ Project path (inside container) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - FORGE_PROJECT_PATH=/project
      - FORGE_MEMORY_DIR=${FORGE_MEMORY_DIR:-}

      # в”Ђв”Ђ Models в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - FORGE_MODEL_CODER=${FORGE_MODEL_CODER:-}
      - FORGE_MODEL_CODER_FALLBACK=${FORGE_MODEL_CODER_FALLBACK:-}
      - FORGE_MODEL_JUNIOR_REVIEWER=${FORGE_MODEL_JUNIOR_REVIEWER:-}
      - FORGE_MODEL_SENIOR_REVIEWER=${FORGE_MODEL_SENIOR_REVIEWER:-}
      - FORGE_MODEL_CONTEXT_UPDATER=${FORGE_MODEL_CONTEXT_UPDATER:-}

      # в”Ђв”Ђ Pipeline limits в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - FORGE_MAX_HOOK_RETRIES=${FORGE_MAX_HOOK_RETRIES:-}
      - FORGE_MAX_JUNIOR_RETRIES=${FORGE_MAX_JUNIOR_RETRIES:-}
      - FORGE_MAX_SENIOR_ROUNDS=${FORGE_MAX_SENIOR_ROUNDS:-}
      - FORGE_AIDER_TIMEOUT=${FORGE_AIDER_TIMEOUT:-}

      # в”Ђв”Ђ Pre-commit commands в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - FORGE_PRECOMMIT_COMMANDS=${FORGE_PRECOMMIT_COMMANDS:-}

      # в”Ђв”Ђ Roadmap patterns в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - FORGE_UNCHECKED_PATTERN=${FORGE_UNCHECKED_PATTERN:-}
      - FORGE_CHECKED_PATTERN=${FORGE_CHECKED_PATTERN:-}

    working_dir: /project

  forge-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: forge-test
    profiles: [ "test" ]
